<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <title>Статьи — Админка Портала капитанов</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="min-h-screen flex flex-col">
  <div id="admin-nav-root" data-active="articles"></div>

  <main class="flex-1 container py-10">
    <!-- Список -->
    <section id="list-view">
      <div class="flex items-center justify-between gap-3 mb-6 flex-wrap">
        <h1 class="font-display text-3xl" style="font-weight: 600;">Статьи</h1>
        <button type="button" id="btn-new" class="btn btn-primary">Новая статья</button>
      </div>

      <div class="flex flex-wrap gap-3 mb-5 items-end">
        <div class="flex-1 min-w-[200px]">
          <label class="field-label" for="flt-search">Поиск</label>
          <input id="flt-search" type="search" class="input" placeholder="Заголовок…" />
        </div>
        <div>
          <label class="field-label" for="flt-category">Категория</label>
          <select id="flt-category" class="select" style="min-width: 200px;">
            <option value="">Все</option>
          </select>
        </div>
        <div>
          <label class="field-label" for="flt-status">Статус</label>
          <select id="flt-status" class="select">
            <option value="">Все</option>
            <option value="draft">Черновик</option>
            <option value="published">Опубликовано</option>
          </select>
        </div>
      </div>

      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead><tr><th>Заголовок</th><th>Категория</th><th>Статус</th><th class="num">Views</th><th class="num">Likes</th><th>Обновлено</th><th></th></tr></thead>
          <tbody id="list-body"><tr><td colspan="7" class="muted">Загружаем…</td></tr></tbody>
        </table>
      </div>
    </section>

    <!-- Форма -->
    <section id="edit-view" style="display: none;">
      <div class="flex items-center gap-3 mb-6">
        <button type="button" id="btn-back" class="btn-ghost">← Назад к списку</button>
      </div>
      <h1 id="edit-title" class="font-display text-3xl mb-6" style="font-weight: 600;">Новая статья</h1>

      <form id="article-form" novalidate>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
          <div>
            <label class="field-label" for="f-title">Заголовок</label>
            <input id="f-title" type="text" class="input" required />
          </div>
          <div>
            <label class="field-label" for="f-category">Категория</label>
            <select id="f-category" class="select"></select>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
          <div>
            <label class="field-label" for="f-tags">Теги (через запятую)</label>
            <input id="f-tags" type="text" class="input" placeholder="старт, встреча, разбор" />
          </div>
          <div>
            <label class="field-label" for="f-status">Статус</label>
            <select id="f-status" class="select">
              <option value="draft">Черновик</option>
              <option value="published">Опубликовано</option>
            </select>
          </div>
        </div>

        <label class="field-label">Тело статьи (Markdown)</label>
        <div class="md-editor-tabs">
          <button type="button" data-tab="source" class="is-active">Текст</button>
          <button type="button" data-tab="preview">Превью</button>
        </div>
        <div class="md-editor-grid show-source" id="md-grid">
          <textarea id="f-body" class="textarea md-editor-source" style="min-height: 320px; font-family: ui-monospace, monospace;"></textarea>
          <div id="f-preview" class="md-editor-preview md-content"></div>
        </div>

        <p id="f-error" class="field-error mt-3">Заполни заголовок и тело.</p>

        <div class="flex items-center gap-3 mt-6">
          <button type="submit" id="f-save" class="btn btn-primary">Сохранить</button>
          <button type="button" id="f-delete" class="btn btn-secondary" style="display: none;">Удалить</button>
        </div>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/admin-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/common.js"></script>
  <script src="js/admin-nav.js"></script>
  <script src="js/admin-articles.js"></script>
</body>
</html>
